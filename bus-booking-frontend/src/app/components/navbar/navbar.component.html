<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand" routerLink="/">
      🚌 <span>BusGo</span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto align-items-center gap-2">
        <li class="nav-item">
          <a class="nav-link" routerLink="/">Home</a>
        </li>

        <!-- PASSENGER links -->
        <ng-container *ngIf="authService.isLoggedIn() && !authService.isAdmin()">
          <li class="nav-item">
            <a class="nav-link" routerLink="/search">Search Buses</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/my-bookings">My Bookings</a>
          </li>
        </ng-container>

        <!-- ADMIN links -->
        <ng-container *ngIf="authService.isLoggedIn() && authService.isAdmin()">
          <li class="nav-item">
            <a class="nav-link" routerLink="/admin/dashboard">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/admin/buses">Manage Buses</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/admin/routes">Manage Routes</a>
          </li>
        </ng-container>

        <!-- Guest links -->
        <ng-container *ngIf="!authService.isLoggedIn()">
          <li class="nav-item">
            <a class="nav-link" routerLink="/search">Search Buses</a>
          </li>
          <li class="nav-item">
            <a class="btn btn-login" routerLink="/login">Login</a>
          </li>
          <li class="nav-item">
            <a class="btn btn-register" routerLink="/register">Register</a>
          </li>
        </ng-container>

        <!-- Logged in user info -->
        <ng-container *ngIf="authService.isLoggedIn()">
          <li class="nav-item">
            <span class="nav-link user-name">
              {{ authService.isAdmin() ? '👨‍💼' : '👤' }}
              {{ authService.getName() }}
            </span>
          </li>
          <li class="nav-item">
            <button class="btn btn-logout" (click)="logout()">Logout</button>
          </li>
        </ng-container>

      </ul>
    </div>
  </div>
</nav>
