<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand" routerLink="/">
      🚌 <span>BusGo</span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto align-items-center gap-2">
        <li class="nav-item">
          <a class="nav-link" routerLink="/">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/search">Search Buses</a>
        </li>

        <ng-container *ngIf="authService.isLoggedIn(); else guestLinks">
          <li class="nav-item">
            <a class="nav-link" routerLink="/my-bookings">My Bookings</a>
          </li>
          <li class="nav-item" *ngIf="authService.isAdmin()">
            <a class="nav-link" routerLink="/admin/dashboard">Admin</a>
          </li>
          <li class="nav-item">
            <span class="nav-link user-name">👤 {{ authService.getName() }}</span>
          </li>
          <li class="nav-item">
            <button class="btn btn-logout" (click)="logout()">Logout</button>
          </li>
        </ng-container>

        <ng-template #guestLinks>
          <li class="nav-item">
            <a class="btn btn-login" routerLink="/login">Login</a>
          </li>
          <li class="nav-item">
            <a class="btn btn-register" routerLink="/register">Register</a>
          </li>
        </ng-template>
      </ul>
    </div>
  </div>
</nav>
